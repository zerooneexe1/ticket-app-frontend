<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/icon.png">
    <title>Login - Ticket App</title>
    <script>
        const userStr = localStorage.getItem('ticketAppUser');
        const tokenStr = localStorage.getItem('ticketAppToken');

        if (userStr || tokenStr) {
            window.location.replace('./');
        }
    </script>
    <link rel="stylesheet" href="css/style.css">    
    <link rel="stylesheet" href="fontawesome/css/fontawesome.css">
    <link rel="stylesheet" href="fontawesome/css/solid.css">
    <link rel="stylesheet" href="fontawesome/css/regular.css">    
    <link rel="stylesheet" href="fontawesome/css/thin.css">
    <script src="js/toast.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h1><div class="img-logo" style="width: 12.45rem; height: 1.75rem; background-image: url(./images/ticket.png); background-size: cover;" /></h1>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="./">Home</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Selamat Datang Kembali</h2>
            <p class="auth-subtitle">Silakan login untuk melanjutkan</p>
            
            <!-- <button id="google-login" class="btn-google">
                <img src="https://www.google.com/favicon.ico" alt="Google" style="width: 20px; height: 20px; margin-right: 10px;">
                Login dengan Google
            </button>
            
            <div class="auth-divider">
                <span>atau</span>
            </div> -->
            
            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            
            <p class="auth-footer">
                Belum punya akun? <a href="#register" onclick="showRegister()">Daftar di sini</a>
            </p>
        </div>
        
        <div class="auth-box" id="register-box" style="display: none;">
            <h2>Buat Akun Baru</h2>
            <p class="auth-subtitle">Daftar untuk mulai membeli tiket</p>
            
            <form id="register-form">
                <div class="form-group">
                    <input type="text" id="register-name" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Daftar</button>
            </form>
            
            <p class="auth-footer">
                Sudah punya akun? <a href="#login" onclick="showLogin()">Login di sini</a>
            </p>
        </div>

        <div class="auth-box" id="verify-box" style="display: none;">
            <h2>Verifikasi Email</h2>
            <p class="auth-subtitle">Masukkan kode OTP 6 digit yang dikirim ke email kamu</p>
            
            <div id="verify-form">
                <div class="otp-inputs" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 25px;">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" style="width: 45px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px;">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" style="width: 45px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px;">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" style="width: 45px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px;">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" style="width: 45px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px;">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" style="width: 45px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px;">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" style="width: 45px; height: 50px; text-align: center; font-size: 20px; border: 2px solid #ddd; border-radius: 8px;">
                </div>
                
                <button id="verify-btn-submit" class="btn-primary" style="background: #28a745;" disabled>Verifikasi</button>
            </div>
            
            <p class="auth-footer">
                Salah memasukkan email? <a href="#register" onclick="showRegister()">Daftar ulang</a>
            </p>
        </div>
    </div>

    <script type="module">
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('nav-menu').classList.toggle('active');
        });
    </script>
    
    <script type="module">
        import { loginWithEmail, registerWithEmail } from './js/auth.js';
        
        let registeredEmail = "";

        window.showLogin = function() {
            document.querySelector('.auth-box').style.display = 'block';
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'none';
        };
        
        window.showRegister = function() {
            document.querySelector('.auth-box').style.display = 'none';
            document.getElementById('register-box').style.display = 'block';
            document.getElementById('verify-box').style.display = 'none';
        };

        window.showVerify = function() {
            document.querySelector('.auth-box').style.display = 'none';
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'block';
        };
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            await loginWithEmail(email, password);
        });
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            const success = await registerWithEmail(email, password, name);
            if (success) {
                registeredEmail = email; // Simpan email untuk verifikasi
                showLogin(); // Tampilkan box Login jika sukses karna OTP ndak bisa kalo pake railway gratis
            }
        });

        const otpInputs = document.querySelectorAll('.otp-box');
        const verifyBtnSubmit = document.getElementById('verify-btn-submit');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                checkOtpComplete();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                const data = e.clipboardData.getData('text').replace(/[^0-9]/g, '').split('');
                if (data.length === 6) {
                    otpInputs.forEach((inp, i) => inp.value = data[i]);
                    checkOtpComplete();
                }
            });
        });

        function checkOtpComplete() {
            const isComplete = Array.from(otpInputs).every(inp => inp.value !== '');
            verifyBtnSubmit.disabled = !isComplete;
        }

        verifyBtnSubmit.addEventListener('click', async () => {
            const otp = Array.from(otpInputs).map(inp => inp.value).join('');
            const success = await verifyEmailOTP(registeredEmail, otp);
            if(success) {
                showLogin();
            }
        });
    </script>

    <style>
        .auth-container {
            margin-top: 10vh;
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .auth-box h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }
        
        .auth-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 35px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        
        .btn-google:hover {
            background: #f5f5f5;
        }
        
        .auth-divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ddd;
        }
        
        .auth-divider::before {
            left: 0;
        }
        
        .auth-divider::after {
            right: 0;
        }
        
        .auth-divider span {
            background: white;
            padding: 0 10px;
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }

        .otp-box:focus {
            border-color: #28a745 !important;
            outline: none;
            box-shadow: 0 0 5px rgba(40, 167, 69, 0.5);
        }
        
        .btn-primary:disabled {
            background: #ccc !important;
            cursor: not-allowed;
        }
    </style>
</body>
</html>
